name: OnAudience Daily Intelligence

on:
  
  workflow_dispatch:
    # Umozliwia reczne uruchomienie z panelu GitHub Actions

permissions:
  contents: write   # potrzebne do pushowania do gh-pages

jobs:
  send-newsletter:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run deploy and send pipeline
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_REPO: michalguzowski-del/onaudience-daily-intel
        run: |
          python3 deploy_and_send.py

      - name: Notify on failure
        if: failure()
        run: |
          echo "Pipeline failed — sprawdz logi powyzej"
