name: OnAudience Daily Intelligence

on:
  schedule:
    # 9:00 Warsaw CEST (UTC+2) = 07:00 UTC — kwiecień–październik
    # 9:00 Warsaw CET (UTC+1)  = 08:00 UTC — październik–marzec
    # GitHub Actions nie obsługuje DST automatycznie — używamy 07:00 UTC
    # W październiku po zmianie czasu (25.10.2026) zaktualizuj na 08:00 UTC
    - cron: '0 7 * * *'
  workflow_dispatch:
    # Umożliwia ręczne uruchomienie z panelu GitHub Actions

jobs:
  send-newsletter:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install premailer requests

      - name: Run deploy and send pipeline
        env:
          GMAIL_USER: michal.guzowski@gmail.com
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NETLIFY_TOKEN: ${{ secrets.NETLIFY_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          RECIPIENT_EMAIL: michal.guzowski@gmail.com
        run: |
          python3 deploy_and_send.py $RECIPIENT_EMAIL

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Pipeline failed — check logs above"
